name: Auto PR for Docs & Instructions

on:
  push:
    paths:
      - 'README.md'
      - 'INSTRUCTIONS.md'
      - 'docs/**'

jobs:
  create-docs-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config user.name "fais-world-bot"
          git config user.email "bot@fais.world"

      - name: Create PR if changes detected
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "docs: update documentation and instructions"
          title: "docs: sync README.md and INSTRUCTIONS.md"
          body: |
            This PR was automatically generated by GitHub Actions to update:
            - README.md
            - INSTRUCTIONS.md
            - all files in /docs
          branch: auto/docs-update
          delete-branch: true
